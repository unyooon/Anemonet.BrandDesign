<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>

  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- フラッシュ防止: テーマを即時適用 -->
  <script>
    (function() {
      var saved = localStorage.getItem('anm-theme');
      var theme = saved === 'dark' || saved === 'light'
        ? saved
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="./styles/site.css" />
  <script type="module" src="./scripts/site.js"></script>
</head>
<body>

  <!-- ============================================================
       Header (simplified — no navigation)
       ============================================================ -->
  <header class="site-header" role="banner">
    <div class="container">
      <a href="./index.html" class="site-logo" aria-label="Anemonet トップへ">
        <span class="logo-name">Anemonet</span>
      </a>

      <div class="header-controls">
        <!-- Theme toggle -->
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-label="ダークモードに切替"
          data-theme-current="light"
        >
          <!-- Sun icon (shown in dark mode) -->
          <svg class="theme-icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg class="theme-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ============================================================
       Main — 404 content
       ============================================================ -->
  <main class="site-main error-page" id="main-content">
    <div class="container">
      <div class="error-content">
        <p class="error-code" aria-label="エラーコード 404">404</p>
        <h1 class="error-message">お探しのページが見つかりませんでした</h1>
        <p class="error-description">
          ページが移動または削除された可能性があります。
        </p>
        <a href="./index.html" class="btn btn-primary btn-md">トップページへ戻る</a>
      </div>
    </div>
  </main>

  <!-- ============================================================
       Footer
       ============================================================ -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div class="footer-inner">
        <div>
          <span class="footer-brand">Anemonet</span>
          <p class="footer-meta">&copy; 2026 Anemonet. All rights reserved.</p>
        </div>
        <nav class="footer-links" aria-label="フッターナビゲーション">
